<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Hub Feedback Form</title>
    <link rel="stylesheet" href="forms.css">
</head>
<body>
    <div class="container">
    <form action="https://formspree.io/f/xgojvzlr" method="POST">
        <h1 class="feedback">MY Feedback Forms</h1>
    <p>please find the below form and fill it to give us your honest reviews about your stay at lab's tech hub</p>
    <!--personal details-->
<div id="details">
        <fieldset class="details">
            <legend>Put your details here</legend>
            <label for="name">First-Name:</label>
            <input type="text" id="name"  name="first-name" required placeholder="don" minlength="3">

            <label for="name_2">Second-Name:</label>
            <input type="text" id="name_2"  name="second-name" required placeholder="moen" minlength="3"/>

            <label for="age">age(recommended):</label>
            <input type="number" id="age" value="number" name="age"required placeholder="2" min="12"/>
        </fieldset>
        </div>
<!--radio-buttons-->
        <div class="radio-option">
        <fieldset id="radio">
            <legend>Did you love stay here</legend>
            <label class="wrap" for="yes_option" >
            <input checked type="radio" id="yes_option" value="yes" name="loved-staying"/>
            <span class="two"></span>
            <span>Yes</span>
            </label>

            <label class="wrap" for="no_option">
            <input type="radio" id="no_option" value="no" name="loved-staying"/>
            <span class="two"></span>
            <span>No</span>
            </label>


            <label class="wrap" for="not_sure_option">
            <input type="radio" id="not_sure_option" value="no-sure" name="loved-staying"/>
            <span class="two"></span>
            <span>Not-Sure</span>
            </label>

        </fieldset>
        </div>
<!--checkboxes-->
        <div class="checkbox">
        <fieldset class="checkbox-option">
            <legend>what were your favorite activities at the hub</legend>
            <label for="coding">
            <input type="checkbox"  id="coding" value="codes" name="coding" checked/>
            <span class="one"></span>
            <span>coding</span>
            </label>

            <label for="debug">
            <input type="checkbox"  id="debug" value="bugs" name="debugging"/>
            <span class="one"></span>
            <span>debugging</span>
            </label>

            <label for="program">
            <input type="checkbox" id="program" value="programs" name="Programming"/>
            <span class="one"></span>
            <span>programming</span>
            </label>

            <label for="engineer">
            <input type="checkbox" id="engineer" value="engineers" name="engineering"/>
            <span class="one"></span>
            <span>engineering</span>
            </label>
        </fieldset>
        </div>
<!--selection-->
        <div class="select-option">
        <fieldset class="select">
            <legend>how would you rate your experience at the hub</legend>
            <select id="options" name="ratings">
            <option value="fair">Fair</option>
            <option value="good">Good</option>
            <option value="very good">Very Good</option>
            <option selected value="excellent">Excellent</option>
            </select>
        </fieldset>
        </div>
<!--textarea-->
        <div class="message">
        <textarea  name="comment" class="textarea" required placeholder="comment here..." minlength="10"></textarea>
        <br>
        </div>
<!--buttton-->
        <div class="button">
        <button class="submit">Submit Form</button>
        </div>
    </form>
    </div>
</body>
</html>
